<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... | Art Appreciation E-Portfolio</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, var(--pink-700) 0%, var(--pink-500) 35%, var(--rose) 65%, var(--pink-300) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 40px 60px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: var(--shadow-xl);
    }

    .flower-spinner {
      font-size: 5rem;
      animation: spin 2s linear infinite;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2));
    }

    .loading-text {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: white;
      letter-spacing: 2px;
      animation: pulse 1s ease-in-out infinite alternate;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    @keyframes spin {
      100% { transform: rotate(360deg) scale(1.1); }
      50% { transform: rotate(180deg) scale(0.9); }
      0% { transform: rotate(0deg) scale(1.1); }
    }

    @keyframes pulse {
      0% { opacity: 0.7; transform: translateY(2px); }
      100% { opacity: 1; transform: translateY(-2px); }
    }
  </style>
  <link rel="icon" type="image/png" href="UA LOGO.png" />
</head>
<body>

  <div class="loader-container">
    <div class="flower-spinner">🌸</div>
    <div class="loading-text">Loading...</div>
  </div>

  <script>
    // Redirect to Home.html after exactly 2 seconds
    setTimeout(() => {
      window.location.replace('Home.html');
    }, 2000);
  </script>
</body>
</html>
